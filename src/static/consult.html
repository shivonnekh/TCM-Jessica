<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>心宜中醫 · 語音診症</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0b0f14;
    --surface:  #141920;
    --card:     #1a2232;
    --green:    #3ecf8e;
    --red:      #f04444;
    --amber:    #f0a844;
    --text:     #e8edf2;
    --muted:    #6b7888;
    --border:   rgba(255,255,255,0.07);
    --radius:   16px;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, "PingFang HK", "Noto Sans HK", sans-serif;
    overflow: hidden;
  }

  #app {
    display: flex;
    flex-direction: column;
    height: 100dvh;
    max-width: 520px;
    margin: 0 auto;
  }

  /* ── Header ── */
  #header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 16px 20px 12px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .logo { font-size: 15px; font-weight: 600; letter-spacing: 0.3px; }
  #connStatus {
    margin-left: auto;
    font-size: 12px;
    padding: 3px 10px;
    border-radius: 999px;
    font-weight: 500;
  }
  #connStatus.connecting { background: rgba(240,168,68,0.15); color: var(--amber); }
  #connStatus.ready      { background: rgba(62,207,142,0.15); color: var(--green); }
  #connStatus.error      { background: rgba(240,68,68,0.15);  color: var(--red); }

  /* ── Patient self-view PiP ── */
  #selfView {
    position: fixed;
    bottom: 140px;
    right: 16px;
    width: 100px;
    height: 140px;
    border-radius: 14px;
    overflow: hidden;
    border: 2px solid rgba(255,255,255,0.12);
    background: #1a2232;
    z-index: 50;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  }
  #selfVideo {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transform: scaleX(-1); /* mirror */
  }
  #selfLabel {
    position: absolute;
    bottom: 4px;
    left: 0; right: 0;
    text-align: center;
    font-size: 9px;
    color: rgba(255,255,255,0.6);
    letter-spacing: 0.3px;
  }

  /* ── Chloe avatar ── */
  #avatarSection {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 28px 20px 20px;
    flex-shrink: 0;
  }
  #avatar {
    width: 88px;
    height: 88px;
    border-radius: 50%;
    background: linear-gradient(135deg, #1e7c56 0%, #2db67d 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 34px;
    font-weight: 700;
    color: white;
    letter-spacing: -1px;
    position: relative;
    transition: box-shadow 0.3s;
  }
  #avatar.speaking {
    box-shadow: 0 0 0 6px rgba(62,207,142,0.25), 0 0 0 12px rgba(62,207,142,0.1);
    animation: speakPulse 1.2s ease-in-out infinite;
  }
  @keyframes speakPulse {
    0%, 100% { box-shadow: 0 0 0 6px rgba(62,207,142,0.25), 0 0 0 12px rgba(62,207,142,0.08); }
    50%       { box-shadow: 0 0 0 10px rgba(62,207,142,0.2), 0 0 0 20px rgba(62,207,142,0.05); }
  }
  #avatarName { margin-top: 12px; font-size: 17px; font-weight: 600; }
  #avatarTitle { font-size: 12px; color: var(--muted); margin-top: 2px; }

  #statusText {
    margin-top: 10px;
    font-size: 13px;
    color: var(--muted);
    height: 18px;
    text-align: center;
    transition: color 0.2s;
  }
  #statusText.active { color: var(--green); }

  /* ── Chat transcript ── */
  #transcript {
    flex: 1;
    overflow-y: auto;
    padding: 12px 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    scroll-behavior: smooth;
  }
  #transcript::-webkit-scrollbar { width: 4px; }
  #transcript::-webkit-scrollbar-track { background: transparent; }
  #transcript::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .bubble {
    max-width: 82%;
    padding: 10px 14px;
    border-radius: 14px;
    font-size: 14px;
    line-height: 1.55;
    word-break: break-word;
    white-space: pre-wrap;
  }
  .bubble.user {
    align-self: flex-end;
    background: #1e4a36;
    color: #d4f5e5;
    border-bottom-right-radius: 4px;
  }
  .bubble.chloe {
    align-self: flex-start;
    background: var(--card);
    color: var(--text);
    border-bottom-left-radius: 4px;
  }
  .bubble.system {
    align-self: center;
    background: transparent;
    color: var(--muted);
    font-size: 12px;
    padding: 2px 0;
  }
  .bubble.typing {
    align-self: flex-start;
    background: var(--card);
    padding: 12px 16px;
  }
  .typing-dots span {
    display: inline-block;
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--muted);
    animation: typingBounce 1.2s infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes typingBounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
    30%            { transform: translateY(-5px); opacity: 1; }
  }

  /* ── PTT controls ── */
  #controls {
    flex-shrink: 0;
    padding: 16px 20px 32px;
    border-top: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }

  #pttHint {
    font-size: 12px;
    color: var(--muted);
    text-align: center;
  }

  #btnPTT {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    border: none;
    background: var(--green);
    color: white;
    font-size: 26px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.12s, background 0.12s, box-shadow 0.12s;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    touch-action: none;
  }
  #btnPTT:active, #btnPTT.recording {
    transform: scale(1.1);
    background: #f04444;
    box-shadow: 0 0 0 12px rgba(240,68,68,0.15);
  }
  #btnPTT:disabled {
    background: var(--surface);
    color: var(--muted);
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }

  #recLabel {
    font-size: 12px;
    color: var(--muted);
    height: 16px;
    text-align: center;
    letter-spacing: 0.2px;
  }
  #recLabel.recording { color: var(--red); }

  /* ── Mic level bar ── */
  #micBar {
    width: 120px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    visibility: hidden;
  }
  #micBarFill {
    height: 100%;
    width: 0%;
    background: var(--red);
    border-radius: 2px;
    transition: width 0.05s;
  }
</style>
</head>
<body>
<div id="app">

  <div id="header">
    <span class="logo">心宜中醫</span>
    <span id="connStatus" class="connecting">連接中…</span>
  </div>

  <!-- Patient self-view -->
  <div id="selfView">
    <video id="selfVideo" autoplay playsinline muted></video>
    <div id="selfLabel">你</div>
  </div>

  <div id="avatarSection">
    <div id="avatar">陳</div>
    <div id="avatarName">Chloe 陳</div>
    <div id="avatarTitle">心宜中醫 AI 助理</div>
    <div id="statusText">–</div>
  </div>

  <div id="transcript"></div>

  <div id="controls">
    <div id="micBar"><div id="micBarFill"></div></div>
    <button id="btnPTT" disabled>🎙️</button>
    <div id="recLabel">按住說話</div>
    <div id="pttHint">按住 🎙️ 說話，放開發送</div>
  </div>

</div>

<script>
// ─────────────────────────────────────────────
// Config
// ─────────────────────────────────────────────
const pathParts  = window.location.pathname.split('/').filter(Boolean);
const ROOM_ID    = pathParts[pathParts.length - 1];
const wsProto    = location.protocol === 'https:' ? 'wss:' : 'ws:';
const WS_URL     = `${wsProto}//${location.host}/ws/voice/${ROOM_ID}`;

// ─────────────────────────────────────────────
// DOM
// ─────────────────────────────────────────────
const connStatus  = document.getElementById('connStatus');
const statusText  = document.getElementById('statusText');
const avatarEl    = document.getElementById('avatar');
const transcript  = document.getElementById('transcript');
const btnPTT      = document.getElementById('btnPTT');
const recLabel    = document.getElementById('recLabel');
const micBar      = document.getElementById('micBar');
const micBarFill  = document.getElementById('micBarFill');

// ─────────────────────────────────────────────
// State
// ─────────────────────────────────────────────
let ws            = null;
let mediaRecorder = null;
let audioChunks   = [];
let isRecording   = false;
let audioCtx      = null;
let analyser      = null;
let micStream     = null;
let animFrame     = null;
let typingBubble  = null;

// ─────────────────────────────────────────────
// WebSocket
// ─────────────────────────────────────────────
function connect() {
  ws = new WebSocket(WS_URL);

  ws.onopen = () => {
    setConn('connecting', '連接中…');
  };

  ws.onmessage = async ({ data }) => {
    let msg;
    try { msg = JSON.parse(data); } catch { return; }

    switch (msg.type) {
      case 'ready':
        setConn('ready', '已連線');
        setStatus('–');
        addBubble('system', '✅ 已連接 Chloe，按住麥克風說話');
        btnPTT.disabled = false;
        break;

      case 'status':
        setStatus(msg.text, true);
        if (!typingBubble) typingBubble = addTyping();
        break;

      case 'transcript':
        addBubble('user', msg.text);
        break;

      case 'response':
        removeTyping();
        setStatus('–');
        addBubble('chloe', msg.text);
        if (msg.audio_b64) await playAudio(msg.audio_b64);
        btnPTT.disabled = false;
        break;

      case 'error':
        removeTyping();
        setStatus('–');
        addBubble('system', '⚠️ ' + msg.text);
        btnPTT.disabled = false;
        break;
    }
  };

  ws.onerror = () => setConn('error', '連線錯誤');

  ws.onclose = () => {
    setConn('error', '已斷線');
    btnPTT.disabled = true;
    setTimeout(connect, 3000);
  };
}

// ─────────────────────────────────────────────
// Mic setup
// ─────────────────────────────────────────────
async function setupMic() {
  try {
    // Request audio + video together — single permission prompt
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: true });

    // Separate tracks: audio → MediaRecorder, video → self-view PiP
    micStream = new MediaStream(stream.getAudioTracks());
    const selfVideo = document.getElementById('selfVideo');
    selfVideo.srcObject = new MediaStream(stream.getVideoTracks());

    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 256;
    audioCtx.createMediaStreamSource(micStream).connect(analyser);
  } catch (e) {
    // Fallback: audio only (no camera)
    try {
      micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
      audioCtx  = new (window.AudioContext || window.webkitAudioContext)();
      analyser  = audioCtx.createAnalyser();
      analyser.fftSize = 256;
      audioCtx.createMediaStreamSource(micStream).connect(analyser);
      document.getElementById('selfView').style.display = 'none';
    } catch {
      addBubble('system', '⚠️ 無法開啟麥克風，請允許瀏覽器使用麥克風');
    }
  }
}

function startMicLevel() {
  const buf = new Uint8Array(analyser?.frequencyBinCount || 0);
  micBar.style.visibility = 'visible';
  function tick() {
    if (!isRecording) return;
    analyser?.getByteFrequencyData(buf);
    const avg = buf.reduce((a, b) => a + b, 0) / (buf.length || 1);
    micBarFill.style.width = Math.min(100, avg * 1.5) + '%';
    animFrame = requestAnimationFrame(tick);
  }
  tick();
}

function stopMicLevel() {
  cancelAnimationFrame(animFrame);
  micBar.style.visibility = 'hidden';
  micBarFill.style.width = '0%';
}

// ─────────────────────────────────────────────
// Push-to-talk
// ─────────────────────────────────────────────
function startRecording() {
  if (isRecording || !micStream || btnPTT.disabled) return;
  isRecording   = true;
  audioChunks   = [];
  btnPTT.classList.add('recording');
  recLabel.textContent = '🔴 錄音中…';
  recLabel.classList.add('recording');

  const mimeType = MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
    ? 'audio/webm;codecs=opus'
    : 'audio/webm';

  mediaRecorder = new MediaRecorder(micStream, { mimeType });
  mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
  mediaRecorder.onstop = sendAudio;
  mediaRecorder.start(100);
  startMicLevel();
}

function stopRecording() {
  if (!isRecording) return;
  isRecording = false;
  btnPTT.classList.remove('recording');
  recLabel.textContent = '處理中…';
  recLabel.classList.remove('recording');
  stopMicLevel();
  mediaRecorder?.stop();
  btnPTT.disabled = true;
}

async function sendAudio() {
  if (!audioChunks.length) {
    btnPTT.disabled = false;
    recLabel.textContent = '按住說話';
    return;
  }
  const blob   = new Blob(audioChunks, { type: 'audio/webm' });
  const buffer = await blob.arrayBuffer();
  if (ws?.readyState === WebSocket.OPEN) {
    ws.send(buffer);
  }
  audioChunks = [];
  recLabel.textContent = '按住說話';
}

// ─────────────────────────────────────────────
// Audio playback
// ─────────────────────────────────────────────
async function playAudio(b64) {
  avatarEl.classList.add('speaking');
  try {
    const bytes  = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
    const blob   = new Blob([bytes], { type: 'audio/mpeg' });
    const url    = URL.createObjectURL(blob);
    const audio  = new Audio(url);
    audio.onended = () => {
      URL.revokeObjectURL(url);
      avatarEl.classList.remove('speaking');
    };
    await audio.play();
  } catch (e) {
    avatarEl.classList.remove('speaking');
    console.warn('Audio playback failed', e);
  }
}

// ─────────────────────────────────────────────
// UI helpers
// ─────────────────────────────────────────────
function setConn(cls, text) {
  connStatus.className = 'connecting ' + cls;
  connStatus.textContent = text;
}

function setStatus(text, active = false) {
  statusText.textContent = text;
  statusText.className   = active ? 'active' : '';
}

function addBubble(role, text) {
  const el = document.createElement('div');
  el.className = `bubble ${role}`;
  el.textContent = text;
  transcript.appendChild(el);
  transcript.scrollTop = transcript.scrollHeight;
  return el;
}

function addTyping() {
  const el = document.createElement('div');
  el.className = 'bubble typing';
  el.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
  transcript.appendChild(el);
  transcript.scrollTop = transcript.scrollHeight;
  return el;
}

function removeTyping() {
  if (typingBubble) { typingBubble.remove(); typingBubble = null; }
}

// ─────────────────────────────────────────────
// PTT event bindings (mouse + touch)
// ─────────────────────────────────────────────
btnPTT.addEventListener('mousedown',  e => { e.preventDefault(); startRecording(); });
btnPTT.addEventListener('mouseup',    e => { e.preventDefault(); stopRecording(); });
btnPTT.addEventListener('mouseleave', e => { if (isRecording) stopRecording(); });
btnPTT.addEventListener('touchstart', e => { e.preventDefault(); startRecording(); }, { passive: false });
btnPTT.addEventListener('touchend',   e => { e.preventDefault(); stopRecording(); },  { passive: false });

// ─────────────────────────────────────────────
// Init
// ─────────────────────────────────────────────
(async function init() {
  await setupMic();
  connect();
})();
</script>
</body>
</html>
